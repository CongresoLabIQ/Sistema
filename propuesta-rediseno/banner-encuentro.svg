<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Degradado principal -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#002147"/>
      <stop offset="50%" style="stop-color:#001E3D"/>
      <stop offset="100%" style="stop-color:#001530"/>
    </linearGradient>
    <!-- Degradado dorado -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C6930C"/>
      <stop offset="50%" style="stop-color:#E4B22A"/>
      <stop offset="100%" style="stop-color:#C6930C"/>
    </linearGradient>
    <!-- Degradado para círculos de logo -->
    <radialGradient id="circleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.04"/>
    </radialGradient>
    <!-- Filtro de brillo -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>

  <!-- Patrón decorativo de fondo -->
  <g opacity="0.05" fill="none" stroke="#C6930C" stroke-width="1">
    <polygon points="50,20 70,10 90,20 90,40 70,50 50,40"/>
    <polygon points="150,80 170,70 190,80 190,100 170,110 150,100"/>
    <polygon points="1050,50 1070,40 1090,50 1090,70 1070,80 1050,70"/>
    <polygon points="700,320 720,310 740,320 740,340 720,350 700,340"/>
    <polygon points="1100,280 1120,270 1140,280 1140,300 1120,310 1100,300"/>
    <polygon points="80,300 100,290 120,300 120,320 100,330 80,320"/>
  </g>

  <!-- Línea dorada superior -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#goldGrad)"/>

  <!-- ===== LOGO UNAM (arriba, centrado) ===== -->
  <g transform="translate(600, 82)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="#C6930C" stroke-width="2.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="53" fill="url(#circleGrad)"/>
    <circle cx="0" cy="0" r="53" fill="none" stroke="#C6930C" stroke-width="1" opacity="0.25"/>
    <g transform="scale(0.85)" fill="none" stroke="#C6930C" stroke-width="2.5">
      <path d="M-15,-25 Q0,-35 15,-25 Q20,-15 25,-5 Q28,5 20,10 Q12,15 0,12 Q-12,15 -20,10 Q-28,5 -25,-5 Q-20,-15 -15,-25Z" fill="#C6930C" opacity="0.12"/>
      <path d="M-8,-18 L0,-22 L8,-18" stroke-width="2"/>
      <path d="M-18,-8 Q-25,-2 -22,5" stroke-width="1.5"/>
      <path d="M18,-8 Q25,-2 22,5" stroke-width="1.5"/>
      <text x="0" y="8" text-anchor="middle" fill="#C6930C" font-family="Georgia, serif" font-size="14" font-weight="700">UNAM</text>
    </g>
  </g>

  <!-- ===== TÍTULO PRINCIPAL ===== -->
  <text x="600" y="175" text-anchor="middle" fill="#FFFFFF" font-family="'Playfair Display', Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" letter-spacing="2">
    Encuentro de Ingeniería Química
  </text>

  <line x1="350" y1="192" x2="850" y2="192" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.7"/>
  <circle cx="600" cy="192" r="4" fill="#C6930C"/>

  <text x="600" y="214" text-anchor="middle" fill="#D4A817" font-family="'Inter', Arial, sans-serif" font-size="12" font-weight="500" letter-spacing="3">
    UNIVERSIDAD NACIONAL AUTÓNOMA DE MÉXICO
  </text>

  <text x="600" y="237" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="Georgia, serif" font-size="11" font-style="italic" letter-spacing="1">
    "Por mi raza hablará el espíritu"
  </text>

  <!-- ===== LOGOS DE LAS FACULTADES (mismo nivel, más grandes) ===== -->
  <!-- Facultad de Química -->
  <g transform="translate(230, 315)">
    <circle cx="0" cy="0" r="55" fill="none" stroke="#C6930C" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="49" fill="url(#circleGrad)"/>
    <circle cx="0" cy="0" r="49" fill="none" stroke="#C6930C" stroke-width="0.8" opacity="0.2"/>
    <g transform="scale(0.75)">
      <rect x="-22" y="-26" width="44" height="44" rx="5" fill="none" stroke="#C6930C" stroke-width="2"/>
      <text x="0" y="-2" text-anchor="middle" fill="#C6930C" font-family="Georgia, serif" font-size="13" font-weight="700">FQ</text>
      <line x1="-18" y1="12" x2="18" y2="12" stroke="#C6930C" stroke-width="1.5"/>
      <text x="0" y="25" text-anchor="middle" fill="#C6930C" font-family="Georgia, serif" font-size="9">QUÍMICA</text>
    </g>
  </g>

  <!-- FES Cuautitlán -->
  <g transform="translate(600, 315)">
    <circle cx="0" cy="0" r="55" fill="none" stroke="#C6930C" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="49" fill="url(#circleGrad)"/>
    <circle cx="0" cy="0" r="49" fill="none" stroke="#C6930C" stroke-width="0.8" opacity="0.2"/>
    <g transform="scale(0.75)">
      <rect x="-22" y="-26" width="44" height="44" rx="5" fill="none" stroke="#C6930C" stroke-width="2"/>
      <text x="0" y="-6" text-anchor="middle" fill="#C6930C" font-family="Georgia, serif" font-size="11" font-weight="700">FES</text>
      <text x="0" y="8" text-anchor="middle" fill="#C6930C" font-family="Georgia, serif" font-size="9">CUAUTITLÁN</text>
      <line x1="-18" y1="16" x2="18" y2="16" stroke="#C6930C" stroke-width="1"/>
    </g>
  </g>

  <!-- FES Zaragoza -->
  <g transform="translate(970, 315)">
    <circle cx="0" cy="0" r="55" fill="none" stroke="#C6930C" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="49" fill="url(#circleGrad)"/>
    <circle cx="0" cy="0" r="49" fill="none" stroke="#C6930C" stroke-width="0.8" opacity="0.2"/>
    <g transform="scale(0.75)">
      <rect x="-22" y="-26" width="44" height="44" rx="5" fill="none" stroke="#C6930C" stroke-width="2"/>
      <text x="0" y="-6" text-anchor="middle" fill="#C6930C" font-family="Georgia, serif" font-size="11" font-weight="700">FES</text>
      <text x="0" y="8" text-anchor="middle" fill="#C6930C" font-family="Georgia, serif" font-size="9">ZARAGOZA</text>
      <line x1="-18" y1="16" x2="18" y2="16" stroke="#C6930C" stroke-width="1"/>
    </g>
  </g>

  <!-- Líneas conectoras decorativas entre logos -->
  <line x1="285" y1="315" x2="545" y2="315" stroke="url(#goldGrad)" stroke-width="1" opacity="0.2"/>
  <line x1="655" y1="315" x2="915" y2="315" stroke="url(#goldGrad)" stroke-width="1" opacity="0.2"/>

  <!-- Línea dorada inferior -->
  <rect x="0" y="396" width="1200" height="4" fill="url(#goldGrad)"/>
</svg>
